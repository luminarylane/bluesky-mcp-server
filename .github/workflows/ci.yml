name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (type check + compile)
        run: npm run build

      - name: Run tests
        run: npm test

  # Single stable check for branch protection rules to require
  # instead of matrix variants like "test-matrix (18)", "test-matrix (20)", etc.
  test:
    needs: [test-matrix]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test matrix status
        run: |
          if [ "${{ needs.test-matrix.result }}" != "success" ]; then
            echo "Test matrix failed: ${{ needs.test-matrix.result }}"
            exit 1
          fi
          echo "All tests passed!"
